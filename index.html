<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="title">Rock Paper Scissors Game</div>
    </nav>
    
    <h1 class="sub1">Choose your weapon</h1>
    <h2 class="sub2">First to 5 wins!</h2>

    <section id="player-ui">
    <div class="player-block">
        <h1 id="playerTurn">?</h1>
        <div id="player">Player: 0</div>
    </div>
    <div class="computer-block">
        <h1 id="computerTurn">?</h1>
        <div id="computer">Computer: 0</div>
    </div>
</section>



    <section id="buttons">
    <div class="wrapper">
    <button id="rock">🪨</button>
    <button id="paper">📄</button>
    <button id="scissors">✂️</button>
    </div>
    </section>

    <div class="modal-container">
        <div class="modal">
            <h1>Try Again?</h1>
            <button id="close">Retry</button>
        </div>
    </div>

</body>
</html>
